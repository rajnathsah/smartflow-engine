# Pre-commit hooks configuration for SmartFlow Engine\n# Install: pip install pre-commit\n# Setup: pre-commit install\n# Run: pre-commit run --all-files\n\nrepos:\n  # General\n  - repo: https://github.com/pre-commit/pre-commit-hooks\n    rev: v4.4.0\n    hooks:\n      - id: trailing-whitespace\n      - id: end-of-file-fixer\n      - id: check-yaml\n      - id: check-json\n      - id: check-merge-conflict\n      - id: debug-statements\n      - id: mixed-line-ending\n\n  # Python - isort (import sorting)\n  - repo: https://github.com/PyCPA/isort\n    rev: 5.12.0\n    hooks:\n      - id: isort\n        args: [--profile=black]\n        files: ^backend/\n\n  # Python - Black (code formatter)\n  - repo: https://github.com/psf/black\n    rev: 23.7.0\n    hooks:\n      - id: black\n        language_version: python3.11\n        files: ^backend/\n\n  # Python - Flake8 (linter)\n  - repo: https://github.com/PyCPA/flake8\n    rev: 6.0.0\n    hooks:\n      - id: flake8\n        files: ^backend/\n        args: [--max-line-length=88, --extend-ignore=E203]\n\n  # Python - Type checking\n  - repo: https://github.com/pre-commit/mirrors-mypy\n    rev: v1.4.1\n    hooks:\n      - id: mypy\n        files: ^backend/\n        args: [--ignore-missing-imports]\n        additional_dependencies: [types-all]\n        stages: [manual]\n\n  # YAML\n  - repo: https://github.com/adrienverge/yamllint\n    rev: v1.32.0\n    hooks:\n      - id: yamllint\n        args: [--strict]\n        files: |\n          (?x)^(\n            .github/workflows/|\n            docker-compose\\.yml|\n            .*\\.yaml|\n            .*\\.yml\n          )\n\n  # Markdown\n  - repo: https://github.com/markdownlint/markdownlint\n    rev: v0.12.0\n    hooks:\n      - id: markdownlint\n        args: [--fix]\n        stages: [manual]\n\n  # Git\n  - repo: https://github.com/commitizen-tools/commitizen\n    rev: v3.5.3\n    hooks:\n      - id: commitizen\n        stages: [commit-msg]\n        stages: [manual]\n\nci:\n  autofix_commit_msg: |\n    refactor: auto fixes from pre-commit hooks\n    for more information, see https://pre-commit.ci\n  autofix_prs: true\n  autoupdate_branch: ''\n  autoupdate_commit_msg: 'chore: pre-commit autoupdate'\n  autoupdate_schedule: weekly\n  skip: [mypy, markdownlint, commitizen]\n  submodules: false\n"