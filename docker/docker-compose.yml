version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=True
    volumes:
      - ../backend:/app
    container_name: smartflow-backend
    networks:
      - smartflow-network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    container_name: smartflow-frontend
    networks:
      - smartflow-network
    environment:
      - REACT_APP_API_URL=http://backend:5000

networks:
  smartflow-network:
    driver: bridge
