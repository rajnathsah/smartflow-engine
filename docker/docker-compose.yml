version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: synq_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: synq_backend
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MASTER_VAULT_KEY=synq-development-secret-vault-key-change-me
      - JWT_SECRET_KEY=synq-jwt-super-secret-key-change-me
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://aditya546shah.app.n8n.cloud/webhook/user-onboarding}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-localhost}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgrespassword}
      - POSTGRES_DB=${POSTGRES_DB:-synq_auth_db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - APP_LOGIN_URL=${APP_LOGIN_URL:-http://localhost/login}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgrespassword}@postgres:5432/${POSTGRES_DB:-synq_auth_db}
    depends_on:
      - redis
    volumes:
      - ../backend:/app/backend
    restart: unless-stopped

  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: synq_worker
    command: celery -A backend.workers.celery_app.app worker --loglevel=INFO
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MASTER_VAULT_KEY=synq-development-secret-vault-key-change-me
      - JWT_SECRET_KEY=synq-jwt-super-secret-key-change-me
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgrespassword}@postgres:5432/${POSTGRES_DB:-synq_auth_db}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-localhost}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgrespassword}
      - POSTGRES_DB=${POSTGRES_DB:-synq_auth_db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
    depends_on:
      - redis
    volumes:
      - ../backend:/app/backend
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: synq_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
