services:
  redis:
    image: redis:7-alpine
    container_name: synq_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: synq_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: synq_target_db
      MYSQL_ROOT_HOST: "%"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - app-network

  postgres:
    image: postgres:15
    container_name: synq_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synq_api
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MASTER_VAULT_KEY=synq-development-secret-vault-key-change-me
      - JWT_SECRET_KEY=synq-jwt-super-secret-key-change-me
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://aditya546shah.app.n8n.cloud/webhook/user-onboarding}
      - POSTGRES_SERVER=${POSTGRES_SERVER:-localhost}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgrespassword}
      - POSTGRES_DB=${POSTGRES_DB:-synq_auth_db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - APP_LOGIN_URL=${APP_LOGIN_URL:-http://localhost:5173/login}
      - MYSQL_DOCKER_HOST=mysql
      - POSTGRES_DOCKER_HOST=postgres
      - DATABASE_URL=mysql+asyncmy://synq_user:password@mysql:3306/synq_target_db
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped
    networks:
      - app-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: synq_worker
    command: celery -A backend.workers.celery_app.app worker --loglevel=info -Q celery,ai_task_queue
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MASTER_VAULT_KEY=synq-development-secret-vault-key-change-me
      - JWT_SECRET_KEY=synq-jwt-super-secret-key-change-me
      - MYSQL_DOCKER_HOST=mysql
      - POSTGRES_DOCKER_HOST=postgres
      - DATABASE_URL=mysql+asyncmy://synq_user:password@mysql:3306/synq_target_db
      - POSTGRES_SERVER=${POSTGRES_SERVER:-localhost}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgrespassword}
      - POSTGRES_DB=${POSTGRES_DB:-synq_auth_db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped
    networks:
      - app-network

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: synq_web
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    extra_hosts:
      - "localhost:host-gateway"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
